<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adventure Fest SA — Production HQ</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 300 200'%3E%3Cpath d='M232 18 a44 44 0 0 1 22 62 l-30 -28 z' fill='%23D5571E'/%3E%3Cg stroke='%232B2D3A' stroke-width='9' stroke-linejoin='round'%3E%3Cpolygon points='150,14 96,130 150,130' fill='%23D9971E'/%3E%3Cpolygon points='150,14 204,130 150,130' fill='%23E8D9BD'/%3E%3Cpolygon points='62,52 22,130 62,130' fill='%234C5A29'/%3E%3Cpolygon points='62,52 102,130 62,130' fill='%23B96A3C'/%3E%3Cpolygon points='243,58 205,130 243,130' fill='%234E8079'/%3E%3Cpolygon points='243,58 281,130 243,130' fill='%232E4D63'/%3E%3C/g%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;500;600;700;800&family=Kalam:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
:root{
  --forest:#4C5A29; --stone:#8C6A47; --water:#2E4D63; --fire:#D5571E;
  --sky:#A3A8AE;   --earth:#F4AF23; --lava:#9D2C2C; --teal:#4E8079; --wind:#3A5769;
  --ink:#2B2D3A; --paper:#F4EFE6; --card:#FFFFFF; --muted:#8A8577;
  --radius:14px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:var(--paper);color:var(--ink);
  background-image:radial-gradient(#e6dfd0 1px, transparent 1px);background-size:26px 26px;}
h1,h2,h3{font-family:'Archivo Black',Inter,sans-serif;letter-spacing:.5px}
button{font-family:inherit;cursor:pointer;border:none}
input,select,textarea{font-family:inherit;font-size:14px}
a{color:var(--fire)}

nav{background:var(--ink);color:#F2EDE2;display:flex;align-items:center;gap:14px;
  padding:10px 22px;position:sticky;top:0;z-index:50;box-shadow:0 3px 14px rgba(0,0,0,.25);flex-wrap:wrap}
.logo-wrap{display:flex;align-items:center;gap:10px;cursor:pointer}
.logo-text{line-height:1}
.logo-text b{font-family:'Archivo Black';font-size:15px;display:block;letter-spacing:1px}
.logo-text span{font-size:9px;letter-spacing:4px;color:#C9A96A;font-weight:700}
.tabs{display:flex;gap:4px;margin-left:8px;flex-wrap:wrap}
.tabs button{background:transparent;color:#BFB9AA;padding:8px 13px;border-radius:9px;font-weight:600;font-size:13.5px}
.tabs button.active{background:#F2EDE2;color:var(--ink)}
.tabs button:hover:not(.active){background:rgba(255,255,255,.08);color:#fff}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:13px}
.event-switch{background:rgba(255,255,255,.1);color:#F2EDE2;border:1px solid rgba(255,255,255,.18);
  border-radius:9px;padding:7px 10px;font-weight:600;font-size:13px;max-width:230px}
.bell{position:relative;background:transparent;font-size:19px}
.bell .dot{position:absolute;top:-4px;right:-6px;background:var(--fire);color:#fff;font-size:10px;
  font-weight:800;border-radius:20px;padding:1px 5px}
.avatar{width:34px;height:34px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;
  font-weight:800;font-size:12px;color:#fff;flex:none;border:2px solid rgba(255,255,255,.4);cursor:pointer}

main{padding:26px 26px 70px;max-width:1500px;margin:0 auto}
.view-title{display:flex;align-items:baseline;gap:14px;margin-bottom:6px;flex-wrap:wrap}
.view-title h2{font-size:26px}
.view-title .sub{color:var(--muted);font-weight:600;font-size:13px}
.pill{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:800;color:#fff}

.home-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:20px;margin-top:18px}
.event-card{background:var(--card);border-radius:var(--radius);padding:20px;box-shadow:0 6px 18px rgba(43,45,58,.08);
  border-top:6px solid var(--fire);transition:transform .15s}
.event-card:hover{transform:translateY(-3px)}
.event-card h3{font-size:18px;margin-bottom:2px}
.event-card .date{color:var(--muted);font-size:12.5px;font-weight:600;margin-bottom:14px}
.big-progress{background:#EEE8DA;height:14px;border-radius:10px;overflow:hidden;margin:6px 0 4px}
.big-progress i{display:block;height:100%;border-radius:10px;background:linear-gradient(90deg,var(--earth),var(--fire));transition:width .6s}
.pct-row{display:flex;justify-content:space-between;font-size:12px;font-weight:700;color:var(--muted);margin-bottom:12px}
.minibars{display:flex;gap:5px;align-items:flex-end;margin:8px 0 14px;min-height:58px}
.minibar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;min-width:0}
.minibar{width:100%;border-radius:4px 4px 0 0;position:relative;background:#EEE8DA;height:44px;overflow:hidden}
.mb-lbl{font-size:8.5px;font-weight:800;color:var(--muted);letter-spacing:.3px;white-space:nowrap}
.minibar i{position:absolute;bottom:0;left:0;right:0;border-radius:3px 3px 0 0}
.card-foot{display:flex;align-items:center;justify-content:space-between}
.avatars{display:flex}
.avatars .avatar{width:28px;height:28px;font-size:10.5px;margin-left:-8px;border:2px solid #fff;cursor:default}
.avatars .avatar:first-child{margin-left:0}
.btn{background:var(--ink);color:#F2EDE2;padding:9px 16px;border-radius:10px;font-weight:700;font-size:13px}
.btn:hover{background:#40435a}
.btn.ghost{background:transparent;color:var(--ink);border:2px dashed #C9C2B0}
.btn.orange{background:var(--fire)} .btn.orange:hover{background:#b8481a}
.btn:disabled{opacity:.5;cursor:wait}
.new-event{border:3px dashed #D5CDBA;border-radius:var(--radius);display:flex;align-items:center;justify-content:center;
  min-height:220px;color:var(--muted);font-weight:700;cursor:pointer;font-size:15px;background:transparent}
.new-event:hover{border-color:var(--fire);color:var(--fire)}

.board{display:flex;gap:16px;overflow-x:auto;padding:18px 4px 30px;align-items:flex-start}
.col{background:rgba(255,255,255,.72);backdrop-filter:blur(3px);border-radius:var(--radius);min-width:280px;max-width:280px;
  padding:0 0 12px;box-shadow:0 5px 16px rgba(43,45,58,.07)}
.col-head{color:#fff;border-radius:var(--radius) var(--radius) 0 0;padding:11px 14px;display:flex;align-items:center;gap:8px;cursor:grab}
.col-head h3{font-size:13.5px;letter-spacing:1px;text-transform:uppercase;flex:1}
.col-head .count{background:rgba(255,255,255,.25);border-radius:12px;font-size:11px;font-weight:800;padding:2px 8px}
.col-head button{background:rgba(255,255,255,.18);color:#fff;border-radius:7px;width:24px;height:24px;font-size:14px;font-weight:800}
.col-head button:hover{background:rgba(255,255,255,.35)}
.col.drag-over{outline:3px dashed var(--fire);outline-offset:3px}
.files-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:12px}
.file-chip{background:#fff;border:2px solid #E6DFCE;border-radius:20px;padding:6px 13px;font-size:12px;font-weight:700;color:var(--ink);display:inline-flex;gap:6px;align-items:center;cursor:pointer;text-decoration:none}
.file-chip:hover{border-color:var(--stone);background:#FBF7EE}
.col-body{padding:12px 12px 2px;display:flex;flex-direction:column;gap:11px;min-height:60px}
.col-prog{margin:10px 12px 0;background:#EBE4D4;height:7px;border-radius:6px;overflow:hidden}
.col-prog i{display:block;height:100%;border-radius:6px}
.col-foot{font-size:11px;font-weight:700;color:var(--muted);margin:5px 14px 0}

.note{background:var(--note-bg,#FFF6D8);border-radius:4px;padding:12px 12px 10px;position:relative;cursor:pointer;
  box-shadow:2px 4px 9px rgba(43,45,58,.16);transform:rotate(-.7deg);transition:transform .12s;border-left:5px solid var(--note-c,#ccc)}
.note:nth-child(even){transform:rotate(.8deg)}
.note:hover{transform:rotate(0) scale(1.02);z-index:2}
.note::before{content:"";position:absolute;top:-7px;left:50%;transform:translateX(-50%) rotate(-2deg);
  width:52px;height:14px;background:rgba(190,180,150,.4);border-radius:2px}
.note h4{font-family:'Kalam',cursive;font-size:15.5px;line-height:1.25;font-weight:700;margin-bottom:4px}
.note p{font-family:'Kalam',cursive;font-size:12.5px;color:#5c5749;line-height:1.3;margin-bottom:8px;white-space:pre-wrap}
.note .meta{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.note .avatar{width:23px;height:23px;font-size:9.5px;border:none;cursor:inherit}
.note .who{font-size:11px;font-weight:700;color:#6d6858;flex:1}
.note.done{opacity:.55}
.note.done h4{text-decoration:line-through}
.chk{width:20px;height:20px;border-radius:6px;border:2px solid #b3ab94;background:#fff;display:inline-flex;
  align-items:center;justify-content:center;font-size:12px;color:#fff;flex:none}
.chk.on{background:var(--forest);border-color:var(--forest)}
.claude-chip{display:inline-flex;align-items:center;gap:4px;background:#fff;border:1.5px solid var(--note-c,#aaa);
  color:var(--ink);font-size:10.5px;font-weight:800;border-radius:14px;padding:3px 9px}
.claude-chip:hover{background:var(--ink);color:#fff}
.add-note{border:2px dashed #cfc7b2;background:transparent;border-radius:8px;padding:9px;font-weight:700;
  color:var(--muted);font-size:12.5px;margin:0 12px}
.add-note:hover{color:var(--fire);border-color:var(--fire)}
.add-col{min-width:230px;border:3px dashed #D5CDBA;border-radius:var(--radius);padding:40px 10px;color:var(--muted);
  font-weight:700;background:transparent;font-size:14px}
.add-col:hover{border-color:var(--fire);color:var(--fire)}
.empty-board{margin:40px auto;text-align:center;color:var(--muted);font-weight:600;max-width:420px;line-height:1.6}

.my-grid{display:grid;grid-template-columns:1fr 330px;gap:20px;margin-top:18px}
.panel{background:var(--card);border-radius:var(--radius);padding:20px;box-shadow:0 6px 18px rgba(43,45,58,.08)}
.panel h3{font-size:15px;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.task-row{display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:10px;background:#FAF6EC;margin-bottom:9px;border-left:5px solid var(--c);cursor:pointer}
.task-row .t{flex:1}
.task-row .t b{font-size:14px;display:block}
.task-row .t span{font-size:11.5px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.task-row.done b{text-decoration:line-through;opacity:.5}
.notif{display:flex;gap:10px;padding:10px 4px;border-bottom:1px solid #F0EADC;font-size:13px;line-height:1.4}
.notif .ic{width:32px;height:32px;border-radius:9px;flex:none;display:flex;align-items:center;justify-content:center;font-size:15px;color:#fff}
.notif small{display:block;color:var(--muted);font-weight:600;margin-top:2px}
.notif.unread{background:#FBF4E2;border-radius:8px}
.msg-in{display:flex;gap:8px;margin-top:12px}
.msg-in input{flex:1;border:2px solid #E6DFCE;border-radius:9px;padding:9px 12px;background:#FCFAF4}
.msg-list{max-height:300px;overflow-y:auto}

.prog-wrap{display:grid;grid-template-columns:270px 1fr;gap:20px;margin-top:18px}
.donut{width:170px;height:170px;border-radius:50%;margin:14px auto;display:flex;align-items:center;justify-content:center;position:relative}
.donut::after{content:"";position:absolute;inset:20px;background:var(--card);border-radius:50%}
.donut b{position:relative;z-index:1;font-family:'Archivo Black';font-size:34px}
.stat{text-align:center;font-weight:700;color:var(--muted);font-size:13px}
.bar-chart{display:flex;flex-direction:column;gap:13px;margin-top:8px}
.bar-row{display:grid;grid-template-columns:150px 1fr 90px;align-items:center;gap:14px}
.bar-row .lbl{font-weight:800;font-size:12.5px;text-transform:uppercase;letter-spacing:.6px;text-align:right}
.bar-track{background:#EEE8DA;height:24px;border-radius:8px;overflow:hidden}
.bar-track i{display:block;height:100%;border-radius:8px;transition:width .7s;display:flex;align-items:center;justify-content:flex-end;padding-right:8px;
  color:#fff;font-size:11px;font-weight:800;min-width:fit-content}
.bar-row .cnt{font-size:12px;font-weight:700;color:var(--muted)}

.report{background:#fff;border-radius:var(--radius);padding:38px 44px;box-shadow:0 6px 18px rgba(43,45,58,.08);margin-top:18px;max-width:900px}
.report .rp-head{display:flex;justify-content:space-between;align-items:center;border-bottom:3px solid var(--ink);padding-bottom:16px;margin-bottom:22px}
.report h2{font-size:22px}
.rp-cat{margin-bottom:22px;page-break-inside:avoid}
.rp-cat h3{font-size:14px;text-transform:uppercase;letter-spacing:1px;display:flex;align-items:center;gap:9px;margin-bottom:8px}
.rp-cat .swatch{width:14px;height:14px;border-radius:4px;display:inline-block}
.rp-cat ul{list-style:none;margin:6px 0 0}
.rp-cat li{font-size:13px;padding:4px 0 4px 24px;position:relative;color:#444}
.rp-cat li.d::before{content:"✔";position:absolute;left:2px;color:var(--forest);font-weight:800}
.rp-cat li.t::before{content:"○";position:absolute;left:4px;color:var(--fire);font-weight:800}

.login{min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:26px;padding:30px}
.login-card{background:#fff;border-radius:20px;padding:38px 42px;box-shadow:0 20px 50px rgba(43,45,58,.15);width:400px;max-width:94vw;text-align:center}
.login-card input{width:100%;border:2px solid #E6DFCE;border-radius:10px;padding:12px 14px;margin-bottom:12px;background:#FCFAF4}
.login-err{color:var(--lava);font-size:13px;font-weight:700;margin-bottom:10px;min-height:18px}

.overlay{position:fixed;inset:0;background:rgba(30,31,42,.55);display:none;align-items:center;justify-content:center;z-index:100;padding:20px}
.overlay.open{display:flex}
.modal{background:#fff;border-radius:16px;padding:26px;width:440px;max-width:95vw;box-shadow:0 24px 60px rgba(0,0,0,.3);max-height:90vh;overflow-y:auto}
.modal h3{font-size:17px;margin-bottom:16px}
.modal label{font-size:11.5px;font-weight:800;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);display:block;margin:12px 0 5px}
.modal input,.modal select,.modal textarea{width:100%;border:2px solid #E6DFCE;border-radius:9px;padding:10px 12px;background:#FCFAF4}
.modal .row{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}
.claude-resp{background:#F4EFE6;border-left:4px solid var(--fire);border-radius:8px;padding:13px 15px;font-size:13.5px;line-height:1.55;margin-top:14px}
.toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);background:var(--ink);color:#F2EDE2;
  padding:12px 22px;border-radius:12px;font-weight:700;font-size:13.5px;box-shadow:0 10px 30px rgba(0,0,0,.3);
  opacity:0;transition:opacity .3s;z-index:200;pointer-events:none;max-width:90vw}
.toast.show{opacity:1}
.legend{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.legend span{font-size:10.5px;font-weight:800;color:#fff;border-radius:12px;padding:3px 10px;letter-spacing:.5px}
.member-row{display:flex;align-items:center;gap:11px;padding:9px 0;border-bottom:1px solid #F0EADC}
.member-row .avatar{cursor:default}
.member-row .m{flex:1}
.member-row .m b{display:block;font-size:14px}
.member-row .m span{font-size:11.5px;color:var(--muted);font-weight:600}
.swatch-pick{display:flex;gap:7px;flex-wrap:wrap;margin-top:4px}
.swatch-pick button{width:28px;height:28px;border-radius:8px;border:3px solid transparent}
.swatch-pick button.sel{border-color:var(--ink)}
.loading{min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;color:var(--muted);font-weight:700}

@media print{
  nav,.no-print{display:none!important}
  body{background:#fff}
  main{padding:0}
  .report{box-shadow:none;padding:10px}
}
@media (max-width:900px){.my-grid,.prog-wrap{grid-template-columns:1fr}}
</style>
</head>
<body>

<div id="app"><div class="loading"><div style="font-size:40px">⛰</div>Loading Production HQ…</div></div>
<div class="overlay" id="overlay"><div class="modal" id="modal"></div></div>
<div class="toast" id="toast"></div>

<script>
/* ================= CONFIG ================= */
const SUPABASE_URL = 'https://gpztlbbyylwkcykocczm.supabase.co';
const SUPABASE_KEY = 'sb_publishable_deJICRsdUfBSTfdYRO7EUw_yLKUCeiG';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const C = {forest:'#4C5A29',stone:'#8C6A47',water:'#2E4D63',fire:'#D5571E',sky:'#A3A8AE',
           earth:'#F4AF23',lava:'#9D2C2C',teal:'#4E8079',wind:'#3A5769',ink:'#2B2D3A'};
const CYCLE = [C.stone,C.earth,C.teal,C.lava,C.fire,C.water,C.wind,C.forest,C.sky];
const STANDARD_CATS = [
  ['Venue',C.stone],['Sponsors',C.earth],['Exhibitors',C.teal],['Compliance',C.lava],
  ['Marketing',C.fire],['Branding',C.water],['Costing',C.wind],['Sport Association',C.forest],['Entertainment',C.sky]
];

const LOGO = `
<svg width="84" height="38" viewBox="60 -95 1640 760" xmlns="http://www.w3.org/2000/svg">
 <circle cx="1120" cy="165" r="255" fill="${C.fire}"/>
 <g stroke="#2E3140" stroke-width="26" stroke-linejoin="round">
  <polygon points="820,10 480,612 790,612" fill="#D9971E"/>
  <polygon points="820,10 790,612 1245,612" fill="#E8D9BD"/>
  <polygon points="730,205 575,612 730,612" fill="#C8871B"/>
  <polygon points="390,215 105,612 300,612" fill="${C.forest}"/>
  <polygon points="390,215 300,612 505,612" fill="#8C6A47"/>
  <polygon points="390,215 505,612 690,612" fill="#B96A3C"/>
  <polygon points="1385,245 1205,612 1395,612" fill="${C.teal}"/>
  <polygon points="1385,245 1395,612 1655,612" fill="${C.water}"/>
  <polygon points="1460,440 1655,612 1402,612" fill="${C.sky}"/>
 </g>
</svg>`;

/* ================= STATE ================= */
let SESSION=null, ME=null, PROFILES=[], EVENTS=[], NOTIFS=[];
let cur = {cols:[], notes:[], files:[], msgs:[]};
let S = {event: localStorage.getItem('afsa_event')||null, view:'home'};
let pendingRefresh=false;

const $=id=>document.getElementById(id);
const usr=id=>PROFILES.find(u=>u.id===id);
const evRow=()=>EVENTS.find(e=>e.id===S.event);
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function abbr(name){const w=name.trim().split(/\s+/);return w.length>1?w.map(x=>x[0]).join('').toUpperCase():name.slice(0,3).toUpperCase();}
function tint(hex,a){return `color-mix(in srgb, ${hex} ${a}%, white)`;}
function toast(m){const t=$('toast');t.innerHTML=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}
function fail(e){console.error(e);toast('⚠️ '+(e.message||e));}
function avatar(u){return u?`<span class="avatar" style="background:${u.color}" title="${esc(u.name)}">${u.initials}</span>`:'';}
function ago(ts){const s=(Date.now()-new Date(ts).getTime())/1000;
  if(s<60)return 'Just now'; if(s<3600)return Math.floor(s/60)+'m ago'; if(s<86400)return Math.floor(s/3600)+'h ago';
  return Math.floor(s/86400)+'d ago';}

/* ================= DATA ================= */
async function loadCore(){
  const [p,e,n] = await Promise.all([
    sb.from('profiles').select('*').order('created_at'),
    sb.from('events').select('*').order('created_at'),
    sb.from('notifications').select('*').eq('user_id', SESSION.user.id).order('created_at',{ascending:false}).limit(30),
  ]);
  if(p.error)throw p.error; if(e.error)throw e.error; if(n.error)throw n.error;
  PROFILES=p.data; EVENTS=e.data; NOTIFS=n.data;
  ME=PROFILES.find(x=>x.id===SESSION.user.id)||null;
  if(!EVENTS.find(x=>x.id===S.event)) S.event = EVENTS[0]?.id || null;
}
async function loadEvent(){
  if(!S.event){cur={cols:[],notes:[],files:[],msgs:[]};return;}
  localStorage.setItem('afsa_event', S.event);
  const [c,n,f,m] = await Promise.all([
    sb.from('columns').select('*').eq('event_id',S.event).order('position'),
    sb.from('notes').select('*').eq('event_id',S.event).order('created_at'),
    sb.from('drive_links').select('*').eq('event_id',S.event).order('name'),
    sb.from('messages').select('*').eq('event_id',S.event).order('created_at',{ascending:false}).limit(30),
  ]);
  if(c.error)throw c.error; if(n.error)throw n.error; if(f.error)throw f.error; if(m.error)throw m.error;
  cur={cols:c.data,notes:n.data,files:f.data,msgs:m.data.reverse()};
}
async function refresh(){ try{ await loadCore(); await loadEvent(); render(); }catch(e){fail(e);} }

let rt=null, rtTimer=null;
function subscribeRealtime(){
  if(rt) sb.removeChannel(rt);
  rt = sb.channel('db-changes')
    .on('postgres_changes',{event:'*',schema:'public'},()=>{
      clearTimeout(rtTimer);
      rtTimer=setTimeout(()=>{
        if($('overlay').classList.contains('open')){pendingRefresh=true;return;}
        refresh();
      },500);
    }).subscribe();
}

/* ================= STATS ================= */
function statsFor(notes,colId){
  const ns=colId?notes.filter(n=>n.column_id===colId):notes;
  const d=ns.filter(n=>n.done).length;
  return {d,t:ns.length,p:ns.length?Math.round(d/ns.length*100):0};
}
const eventStatsCache={};
async function loadHomeStats(){
  const {data,error}=await sb.from('notes').select('event_id,column_id,done');
  if(error)throw error;
  const {data:allCols,error:e2}=await sb.from('columns').select('*').order('position');
  if(e2)throw e2;
  eventStatsCache.notes=data; eventStatsCache.cols=allCols;
}

async function toggleDone(id){

async function renameCol(id){
  const c=cur.cols.find(c=>c.id===id);
  const n=prompt('Rename column:',c.name); if(!n)return;

  await loadEvent(); render();}catch(e){fail(e);}
}
async function delCol(id){
  const c=cur.cols.find(c=>c.id===id);
  if(!confirm(`Delete “${c.name}” and all its notes?`))return;
  try{const {error}=await sb.from('columns').delete().eq('id',id); if(error)throw error;
  await loadEvent(); render();}catch(e){fail(e);}
}
let _dragCol=null;
function dragCol(id){_dragCol=id;}
async function dropCol(targetId){
  if(!_dragCol||_dragCol===targetId){_dragCol=null;return;}
  const from=cur.cols.findIndex(c=>c.id===_dragCol);
  const item=cur.cols.splice(from,1)[0];
  const to=cur.cols.findIndex(c=>c.id===targetId);
  cur.cols.splice(to,0,item); _dragCol=null; render();
  try{await Promise.all(cur.cols.map((c,i)=>sb.from('columns').update({position:i}).eq('id',c.id)));}catch(e){fail(e);}
}

async function updNote(id){
  const n=cur.notes.find(x=>x.id===id); const prevWho=n.assignee;
  const patch={
    title:$('f-title').value.trim()||n.title,
    description:$('f-desc').value.trim(),
    assignee:$('f-who').value||null,
    column_id:$('f-col').value,
    done:$('f-done').value==='1',
  };
  try{
    const {error}=await sb.from('notes').update(patch).eq('id',id); if(error)throw error;
    if(patch.assignee&&patch.assignee!==prevWho){
      await notify(patch.assignee,`${ME.name.split(' ')[0]} allocated to you: ${patch.title}`);
      if(patch.assignee!==ME.id)toast(`📌 Allocated to ${usr(patch.assignee).name.split(' ')[0]}`);
    } else toast('Note updated');
    closeModal(); await loadEvent(); render();
  }catch(e){fail(e);}
}

  if(!confirm('Delete this sticky note?'))return;
  try{const {error}=await sb.from('notes').delete().eq('id',id); if(error)throw error;

  const {error}=await sb.from('notifications').insert({user_id:userId,body,icon:'📌',color:ME.color});

async function markRead(){
  if(!NOTIFS.some(n=>!n.read))return;
  NOTIFS.forEach(n=>n.read=true);
  await sb.from('notifications').update({read:true}).eq('user_id',ME.id).eq('read',false);
}

/* ---------- PROGRESS ---------- */
function progressView(){
  const e=evRow();
  if(!e)return `<div class="empty-board">Create a board first to see progress.</div>`;
  const s=statsFor(cur.notes);
  return `<div class="view-title"><h2>Progress</h2><span class="sub">${esc(e.name)} · live from the board</span></div>
  <div class="prog-wrap">
    <div class="panel" style="text-align:center">
      <h3 style="justify-content:center">Overall</h3>
      <div class="donut" style="background:conic-gradient(${C.forest} ${s.p}%, #EEE8DA 0)"><b>${s.p}%</b></div>
      <div class="stat">${s.d} done · ${s.t-s.d} to go · ${s.t} total</div>
      <div class="legend" style="justify-content:center;margin-top:16px">
        <span style="background:${C.forest}">DONE</span><span style="background:#C9C2B0">TO DO</span>
      </div>
    </div>
    <div class="panel">
      <h3>📊 Things done vs things to do — per category</h3>
      <div class="bar-chart">
        ${cur.cols.map(c=>{const cs=statsFor(cur.notes,c.id);
          return `<div class="bar-row">
            <div class="lbl" style="color:${c.color}">${esc(c.name)}</div>
            <div class="bar-track"><i style="width:${Math.max(cs.p,7)}%;background:${c.color}">${cs.p}%</i></div>
            <div class="cnt">${cs.d} done / ${cs.t-cs.d} to do</div>
          </div>`;}).join('')||'<p style="color:var(--muted)">No categories yet.</p>'}
      </div>
    </div>
  </div>`;
}

/* ---------- REPORT ---------- */
function reportView(){
  const e=evRow();
  if(!e)return `<div class="empty-board">Create a board first to generate a report.</div>`;
  const s=statsFor(cur.notes);
  const today=new Date().toLocaleDateString('en-ZA',{day:'numeric',month:'long',year:'numeric'});
  return `<div class="view-title no-print"><h2>Progress Report</h2>
    <button class="btn orange" style="margin-left:auto" onclick="window.print()">🖨 Print / Save as PDF</button></div>
  <div class="report">
    <div class="rp-head">
      <div style="display:flex;align-items:center;gap:12px">${LOGO}
        <div><h2>${esc(e.name)}</h2><div style="font-size:12px;color:var(--muted);font-weight:700">PRODUCTION PROGRESS REPORT · ${today}</div></div>
      </div>
      <div style="text-align:right"><div style="font-family:'Archivo Black';font-size:34px;color:${C.forest}">${s.p}%</div>
      <div style="font-size:11px;font-weight:800;color:var(--muted)">OVERALL COMPLETE</div></div>
    </div>
    <div class="big-progress" style="height:18px"><i style="width:${s.p}%"></i></div>
    <div class="pct-row" style="margin-bottom:26px"><span>${s.d} of ${s.t} tasks complete</span><span>${s.t-s.d} outstanding</span></div>
    ${cur.cols.map(c=>{const cs=statsFor(cur.notes,c.id);
      const dn=cur.notes.filter(n=>n.column_id===c.id&&n.done);
      const td=cur.notes.filter(n=>n.column_id===c.id&&!n.done);
      return `<div class="rp-cat">
        <h3><span class="swatch" style="background:${c.color}"></span>${esc(c.name)}
          <span style="margin-left:auto;font-family:Inter;font-size:12px;color:var(--muted)">${cs.d}/${cs.t} · ${cs.p}%</span></h3>
        <div class="bar-track" style="height:10px"><i style="width:${Math.max(cs.p,3)}%;background:${c.color}"></i></div>
        <ul>
          ${dn.map(n=>`<li class="d">${esc(n.title)} <span style="color:#999">— ${usr(n.assignee)?esc(usr(n.assignee).name):'Unassigned'}</span></li>`).join('')}
          ${td.map(n=>`<li class="t">${esc(n.title)} <span style="color:#999">— ${usr(n.assignee)?esc(usr(n.assignee).name):'Unassigned'}</span></li>`).join('')}
        </ul>
      </div>`;}).join('')}
    <div style="border-top:2px solid #EEE8DA;padding-top:14px;font-size:11px;color:var(--muted);font-weight:600">
      Generated by Adventure Fest SA Production HQ</div>
  </div>`;
}

/* ---------- TEAM ---------- */
function teamModal(){
  openModal(`<h3>👥 Team</h3>
    ${PROFILES.map(u=>`<div class="member-row">${avatar(u)}
      <div class="m"><b>${esc(u.name)}${u.id===ME.id?' (you)':''}</b><span>${esc(u.role||'')} · ${esc(u.email)}</span></div></div>`).join('')}
    <h3 style="margin-top:22px">＋ Add team member</h3>
    <label>Full name</label><input id="tm-name" placeholder="e.g. Riaan Venter">
    <label>Email</label><input id="tm-email" type="email" placeholder="name@adventurefestsa.co.za">
    <label>Role</label><input id="tm-role" placeholder="e.g. Operations">
    <label>Temporary password (share it with them — min 8 characters)</label><input id="tm-pw" placeholder="They can change it later">
    <label>Colour</label>
    <div class="swatch-pick" id="tm-colors">${Object.values(C).slice(0,9).map((c,i)=>`<button style="background:${c}" class="${i===0?'sel':''}" onclick="pickColor(this)" data-c="${c}"></button>`).join('')}</div>
    <div class="row">
      <button class="btn ghost" style="margin-right:auto" onclick="changePwModal()">🔑 Change my password</button>
      <button class="btn ghost" onclick="signOut()">Sign out</button>
      <button class="btn orange" id="tm-go" onclick="inviteMember()">Add member</button>
    </div>`);
}
function pickColor(btn){document.querySelectorAll('#tm-colors button').forEach(b=>b.classList.remove('sel'));btn.classList.add('sel');}
async function inviteMember(){
  const name=$('tm-name').value.trim(), email=$('tm-email').value.trim(), pw=$('tm-pw').value, role=$('tm-role').value.trim();
  if(!name||!email||!pw){toast('Name, email and password are required');return;}
  const color=document.querySelector('#tm-colors button.sel')?.dataset.c||C.fire;
  const b=$('tm-go');b.disabled=true;
  try{
    const {data:{session}}=await sb.auth.getSession();
    const res=await fetch(`${SUPABASE_URL}/functions/v1/invite-user`,{
      method:'POST',
      headers:{'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':`Bearer ${session.access_token}`},
      body:JSON.stringify({email,password:pw,name,role,color}),
    });
    const j=await res.json();
    if(!res.ok)throw new Error(j.error||'Could not create the account');
    await loadCore(); teamModal(); toast(`🎉 ${name.split(' ')[0]} added — they can sign in now`);
  }catch(e){fail(e);b.disabled=false;}
}
function changePwModal(){
  openModal(`<h3>🔑 Change my password</h3>
    <label>New password (min 8 characters)</label><input id="pw-new" type="password">
    <div class="row"><button class="btn ghost" onclick="teamModal()">Back</button>
    <button class="btn orange" onclick="changePw()">Update password</button></div>`);
}
async function changePw(){
  const pw=$('pw-new').value; if(pw.length<8){toast('Minimum 8 characters');return;}
  try{const {error}=await sb.auth.updateUser({password:pw}); if(error)throw error;
  closeModal(); toast('🔑 Password updated');}catch(e){fail(e);}
}

/* ---------- MODAL ---------- */
function openModal(html){$('modal').innerHTML=html;$('overlay').classList.add('open');}
function closeModal(){
  $('overlay').classList.remove('open');
  if(pendingRefresh){pendingRefresh=false;refresh();}
}
$('overlay').addEventListener('click',e=>{if(e.target.id==='overlay')closeModal();});

/* ================= BOOT ================= */
async function bootData(){
  try{
    await loadCore(); await loadEvent(); await loadHomeStats();
    subscribeRealtime(); render();
  }catch(e){ fail(e); render(); }
}
(async ()=>{
  const {data:{session}}=await sb.auth.getSession();
  SESSION=session;
  if(SESSION) await bootData(); else render();
  sb.auth.onAuthStateChange((_ev,s)=>{ SESSION=s; if(!s)render(); });
})();
</script>
