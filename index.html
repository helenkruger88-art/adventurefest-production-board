<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adventure Fest SA — Production HQ</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 300 200'%3E%3Cpath d='M232 18 a44 44 0 0 1 22 62 l-30 -28 z' fill='%23D5571E'/%3E%3Cg stroke='%232B2D3A' stroke-width='9' stroke-linejoin='round'%3E%3Cpolygon points='150,14 96,130 150,130' fill='%23D9971E'/%3E%3Cpolygon points='150,14 204,130 150,130' fill='%23E8D9BD'/%3E%3Cpolygon points='62,52 22,130 62,130' fill='%234C5A29'/%3E%3Cpolygon points='62,52 102,130 62,130' fill='%23B96A3C'/%3E%3Cpolygon points='243,58 205,130 243,130' fill='%234E8079'/%3E%3Cpolygon points='243,58 281,130 243,130' fill='%232E4D63'/%3E%3C/g%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;500;600;700;800&family=Kalam:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
:root{
  --forest:#4C5A29; --stone:#8C6A47; --water:#2E4D63; --fire:#D5571E;
  --sky:#A3A8AE;   --earth:#F4AF23; --lava:#9D2C2C; --teal:#4E8079; --wind:#3A5769;
  --ink:#2B2D3A; --paper:#F4EFE6; --card:#FFFFFF; --muted:#8A8577;
  --radius:14px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:var(--paper);color:var(--ink);
  background-image:radial-gradient(#e6dfd0 1px, transparent 1px);background-size:26px 26px;}
h1,h2,h3{font-family:'Archivo Black',Inter,sans-serif;letter-spacing:.5px}
button{font-family:inherit;cursor:pointer;border:none}
input,select,textarea{font-family:inherit;font-size:14px}
a{color:var(--fire)}

nav{background:var(--ink);color:#F2EDE2;display:flex;align-items:center;gap:14px;
  padding:10px 22px;position:sticky;top:0;z-index:50;box-shadow:0 3px 14px rgba(0,0,0,.25);flex-wrap:wrap}
.logo-wrap{display:flex;align-items:center;gap:10px;cursor:pointer}
.logo-text{line-height:1}
.logo-text b{font-family:'Archivo Black';font-size:15px;display:block;letter-spacing:1px}
.logo-text span{font-size:9px;letter-spacing:4px;color:#C9A96A;font-weight:700}
.tabs{display:flex;gap:4px;margin-left:8px;flex-wrap:wrap}
.tabs button{background:transparent;color:#BFB9AA;padding:8px 13px;border-radius:9px;font-weight:600;font-size:13.5px}
.tabs button.active{background:#F2EDE2;color:var(--ink)}
.tabs button:hover:not(.active){background:rgba(255,255,255,.08);color:#fff}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:13px}
.event-switch{background:rgba(255,255,255,.1);color:#F2EDE2;border:1px solid rgba(255,255,255,.18);
  border-radius:9px;padding:7px 10px;font-weight:600;font-size:13px;max-width:230px}
.bell{position:relative;background:transparent;font-size:19px}
.bell .dot{position:absolute;top:-4px;right:-6px;background:var(--fire);color:#fff;font-size:10px;
  font-weight:800;border-radius:20px;padding:1px 5px}
.avatar{width:34px;height:34px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;
  font-weight:800;font-size:12px;color:#fff;flex:none;border:2px solid rgba(255,255,255,.4);cursor:pointer}

main{padding:26px 26px 70px;max-width:1500px;margin:0 auto}
.view-title{display:flex;align-items:baseline;gap:14px;margin-bottom:6px;flex-wrap:wrap}
.view-title h2{font-size:26px}
.view-title .sub{color:var(--muted);font-weight:600;font-size:13px}
.pill{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:800;color:#fff}

.home-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:20px;margin-top:18px}
.event-card{background:var(--card);border-radius:var(--radius);padding:20px;box-shadow:0 6px 18px rgba(43,45,58,.08);
  border-top:6px solid var(--fire);transition:transform .15s}
.event-card:hover{transform:translateY(-3px)}
.event-card h3{font-size:18px;margin-bottom:2px}
.event-card .date{color:var(--muted);font-size:12.5px;font-weight:600;margin-bottom:14px}
.big-progress{background:#EEE8DA;height:14px;border-radius:10px;overflow:hidden;margin:6px 0 4px}
.big-progress i{display:block;height:100%;border-radius:10px;background:linear-gradient(90deg,var(--earth),var(--fire));transition:width .6s}
.pct-row{display:flex;justify-content:space-between;font-size:12px;font-weight:700;color:var(--muted);margin-bottom:12px}
.minibars{display:flex;gap:5px;align-items:flex-end;margin:8px 0 14px;min-height:58px}
.minibar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;min-width:0}
.minibar{width:100%;border-radius:4px 4px 0 0;position:relative;background:#EEE8DA;height:44px;overflow:hidden}
.mb-lbl{font-size:8.5px;font-weight:800;color:var(--muted);letter-spacing:.3px;white-space:nowrap}
.minibar i{position:absolute;bottom:0;left:0;right:0;border-radius:3px 3px 0 0}
.card-foot{display:flex;align-items:center;justify-content:space-between}
.avatars{display:flex}
.avatars .avatar{width:28px;height:28px;font-size:10.5px;margin-left:-8px;border:2px solid #fff;cursor:default}
.avatars .avatar:first-child{margin-left:0}
.btn{background:var(--ink);color:#F2EDE2;padding:9px 16px;border-radius:10px;font-weight:700;font-size:13px}
.btn:hover{background:#40435a}
.btn.ghost{background:#fff;color:var(--ink);border:1px solid #DAD3C2;font-weight:600}
.btn.ghost:hover{border-color:#B8AF98;background:#FBF8F0}
.btn.orange{background:var(--fire)} .btn.orange:hover{background:#b8481a}
.btn:disabled{opacity:.5;cursor:wait}
.new-event{border:1px solid #DAD3C2;background:#FFFDF8;border-radius:var(--radius);display:flex;align-items:center;justify-content:center;
  min-height:220px;color:var(--muted);font-weight:700;cursor:pointer;font-size:15px;background:transparent}
.new-event:hover{border-color:var(--fire);color:var(--fire)}

.board{display:flex;gap:16px;overflow-x:auto;padding:18px 4px 30px;align-items:flex-start}
.col{background:rgba(255,255,255,.72);backdrop-filter:blur(3px);border-radius:var(--radius);min-width:280px;max-width:280px;
  padding:0 0 12px;box-shadow:0 5px 16px rgba(43,45,58,.07)}
.col-head{color:#fff;border-radius:var(--radius) var(--radius) 0 0;padding:11px 14px;display:flex;align-items:center;gap:8px;cursor:grab}
.col-head h3{font-size:13.5px;letter-spacing:1px;text-transform:uppercase;flex:1}
.col-head .count{background:rgba(255,255,255,.25);border-radius:12px;font-size:11px;font-weight:800;padding:2px 8px}
.col-head button{background:rgba(255,255,255,.18);color:#fff;border-radius:7px;width:24px;height:24px;font-size:14px;font-weight:800}
.col-head button:hover{background:rgba(255,255,255,.35)}
.col.drag-over{outline:3px dashed var(--fire);outline-offset:3px}
.files-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:12px}
.file-chip{background:#fff;border:1px solid #E0D9C8;border-radius:18px;padding:7px 14px;font-size:12px;font-weight:600;color:var(--ink);display:inline-flex;gap:6px;align-items:center;cursor:pointer;text-decoration:none;transition:border-color .15s,background .15s}
summary.file-chip{list-style:none}
summary.file-chip::-webkit-details-marker{display:none}
body.drag-note .rcol{outline:2px dashed rgba(255,255,255,.95);outline-offset:-5px;transform:scale(1.02)}
.file-chip:hover{border-color:var(--stone);background:#FBF7EE}
.col-body{padding:12px 12px 2px;display:flex;flex-direction:column;gap:11px;min-height:60px}
.col-prog{margin:10px 12px 0;background:#EBE4D4;height:7px;border-radius:6px;overflow:hidden}
.col-prog i{display:block;height:100%;border-radius:6px}
.col-foot{font-size:11px;font-weight:700;color:var(--muted);margin:5px 14px 0}

.note{background:var(--note-bg,#FFF6D8);border-radius:6px;padding:12px 12px 10px;position:relative;cursor:pointer;
  box-shadow:2px 4px 9px rgba(43,45,58,.14);transition:transform .12s, box-shadow .12s;border-left:5px solid var(--note-c,#ccc)}
.note:hover{transform:translateY(-2px);box-shadow:3px 6px 14px rgba(43,45,58,.18);z-index:2}
.note h4{font-family:'Inter',sans-serif;font-size:14px;line-height:1.3;font-weight:800;margin-bottom:4px;letter-spacing:0}
.note p{font-family:'Inter',sans-serif;font-size:12.5px;color:#5c5749;line-height:1.45;margin-bottom:8px;white-space:pre-wrap}
.note .meta{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.note .avatar{width:23px;height:23px;font-size:9.5px;border:none;cursor:inherit}
.note .who{font-size:11px;font-weight:700;color:#6d6858;flex:1}
.note.done{opacity:.55}
.note.done h4{text-decoration:line-through}
.due{display:inline-flex;align-items:center;gap:4px;font-size:10.5px;font-weight:800;border-radius:12px;padding:3px 9px;margin-bottom:8px}
.chk{width:20px;height:20px;border-radius:6px;border:2px solid #b3ab94;background:#fff;display:inline-flex;
  align-items:center;justify-content:center;font-size:12px;color:#fff;flex:none}
.chk.on{background:var(--forest);border-color:var(--forest)}
.claude-chip{display:inline-flex;align-items:center;gap:4px;background:#fff;border:1.5px solid var(--note-c,#aaa);
  color:var(--ink);font-size:10.5px;font-weight:800;border-radius:14px;padding:3px 9px}
.claude-chip:hover{background:var(--ink);color:#fff}
.add-note{border:1px solid #DAD3C2;background:#fff;border-radius:8px;padding:9px;font-weight:600;
  color:var(--muted);font-size:12.5px;margin:0 12px}
.add-note:hover{color:var(--fire);border-color:var(--fire)}
.add-col{min-width:230px;border:1px solid #DAD3C2;background:#FFFDF8;border-radius:var(--radius);padding:40px 10px;color:var(--muted);
  font-weight:700;background:transparent;font-size:14px}
.add-col:hover{border-color:var(--fire);color:var(--fire)}

/* rail layout */
.board-wrap{display:flex;gap:18px;align-items:flex-start;margin-top:16px}
.rail{display:flex;flex-direction:column;gap:7px;width:200px;flex:none}
.rcol{display:flex;align-items:center;gap:8px;color:#fff;border-radius:10px;padding:10px 13px;font-weight:800;
  font-size:12.5px;letter-spacing:.4px;text-transform:uppercase;text-align:left;opacity:.62;cursor:grab;
  box-shadow:0 3px 8px rgba(43,45,58,.10);transition:opacity .12s, transform .12s}
.rcol:hover{opacity:.85;transform:translateX(2px)}
.rcol.sel{opacity:1;outline:3px solid var(--ink);transform:translateX(4px)}
.rcol .rname{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rcol .rcount{background:rgba(255,255,255,.28);border-radius:12px;font-size:11px;padding:2px 8px}
.rail .add-rail{border:1px solid #DAD3C2;background:#fff;border-radius:10px;padding:10px;font-weight:600;color:var(--muted);font-size:12.5px}
.rail .add-rail:hover{color:var(--fire);border-color:var(--fire)}
.open-col{flex:1;min-width:0;background:rgba(255,255,255,.72);backdrop-filter:blur(3px);border-radius:var(--radius);
  box-shadow:0 5px 16px rgba(43,45,58,.07);padding-bottom:14px}
.notes-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(235px,1fr));gap:16px;padding:16px 16px 4px}
@media (max-width:820px){
  .board-wrap{flex-direction:column}
  .rail{flex-direction:row;flex-wrap:wrap;width:100%}
  .rcol{padding:7px 11px}
}
.empty-board{margin:40px auto;text-align:center;color:var(--muted);font-weight:600;max-width:420px;line-height:1.6}

.my-grid{display:grid;grid-template-columns:1fr 330px;gap:20px;margin-top:18px}
.panel{background:var(--card);border-radius:var(--radius);padding:20px;box-shadow:0 6px 18px rgba(43,45,58,.08)}
.panel h3{font-size:15px;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.task-row{display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:10px;background:#FAF6EC;margin-bottom:9px;border-left:5px solid var(--c);cursor:pointer}
.task-row .t{flex:1}
.task-row .t b{font-size:14px;display:block}
.task-row .t span{font-size:11.5px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.task-row.done b{text-decoration:line-through;opacity:.5}
.notif{display:flex;gap:10px;padding:10px 4px;border-bottom:1px solid #F0EADC;font-size:13px;line-height:1.4}
.notif .ic{width:32px;height:32px;border-radius:9px;flex:none;display:flex;align-items:center;justify-content:center;font-size:15px;color:#fff}
.notif small{display:block;color:var(--muted);font-weight:600;margin-top:2px}
.notif.unread{background:#FBF4E2;border-radius:8px}
.msg-in{display:flex;gap:8px;margin-top:12px}
.msg-in input{flex:1;border:2px solid #E6DFCE;border-radius:9px;padding:9px 12px;background:#FCFAF4}
.msg-list{max-height:300px;overflow-y:auto}

.prog-wrap{display:grid;grid-template-columns:270px 1fr;gap:20px;margin-top:18px}
.donut{width:170px;height:170px;border-radius:50%;margin:14px auto;display:flex;align-items:center;justify-content:center;position:relative}
.donut::after{content:"";position:absolute;inset:20px;background:var(--card);border-radius:50%}
.donut b{position:relative;z-index:1;font-family:'Archivo Black';font-size:34px}
.stat{text-align:center;font-weight:700;color:var(--muted);font-size:13px}
.bar-chart{display:flex;flex-direction:column;gap:13px;margin-top:8px}
.bar-row{display:grid;grid-template-columns:150px 1fr 90px;align-items:center;gap:14px}
.bar-row .lbl{font-weight:800;font-size:12.5px;text-transform:uppercase;letter-spacing:.6px;text-align:right}
.bar-track{background:#EEE8DA;height:24px;border-radius:8px;overflow:hidden}
.bar-track i{display:block;height:100%;border-radius:8px;transition:width .7s;display:flex;align-items:center;justify-content:flex-end;padding-right:8px;
  color:#fff;font-size:11px;font-weight:800;min-width:fit-content}
.bar-row .cnt{font-size:12px;font-weight:700;color:var(--muted)}

.report{background:#fff;border-radius:var(--radius);padding:38px 44px;box-shadow:0 6px 18px rgba(43,45,58,.08);margin-top:18px;max-width:900px}
.report .rp-head{display:flex;justify-content:space-between;align-items:center;border-bottom:3px solid var(--ink);padding-bottom:16px;margin-bottom:22px}
.report h2{font-size:22px}
.rp-cat{margin-bottom:22px;page-break-inside:avoid}
.rp-cat h3{font-size:14px;text-transform:uppercase;letter-spacing:1px;display:flex;align-items:center;gap:9px;margin-bottom:8px}
.rp-cat .swatch{width:14px;height:14px;border-radius:4px;display:inline-block}
.rp-cat ul{list-style:none;margin:6px 0 0}
.rp-cat li{font-size:13px;padding:4px 0 4px 24px;position:relative;color:#444}
.rp-cat li.d::before{content:"✔";position:absolute;left:2px;color:var(--forest);font-weight:800}
.rp-cat li.t::before{content:"○";position:absolute;left:4px;color:var(--fire);font-weight:800}

.login{min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:26px;padding:30px}
.login-card{background:#fff;border-radius:20px;padding:38px 42px;box-shadow:0 20px 50px rgba(43,45,58,.15);width:400px;max-width:94vw;text-align:center}
.login-card input{width:100%;border:2px solid #E6DFCE;border-radius:10px;padding:12px 14px;margin-bottom:12px;background:#FCFAF4}
.login-err{color:var(--lava);font-size:13px;font-weight:700;margin-bottom:10px;min-height:18px}

.overlay{position:fixed;inset:0;background:rgba(30,31,42,.55);display:none;align-items:center;justify-content:center;z-index:100;padding:20px}
.overlay.open{display:flex}
.modal{background:#fff;border-radius:16px;padding:26px;width:440px;max-width:95vw;box-shadow:0 24px 60px rgba(0,0,0,.3);max-height:90vh;overflow-y:auto}
.modal h3{font-size:17px;margin-bottom:16px}
.modal label{font-size:11.5px;font-weight:800;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);display:block;margin:12px 0 5px}
.modal input,.modal select,.modal textarea{width:100%;border:2px solid #E6DFCE;border-radius:9px;padding:10px 12px;background:#FCFAF4}
.modal .row{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}
.claude-resp{background:#F4EFE6;border-left:4px solid var(--fire);border-radius:8px;padding:13px 15px;font-size:13.5px;line-height:1.55;margin-top:14px}
.toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);background:var(--ink);color:#F2EDE2;
  padding:12px 22px;border-radius:12px;font-weight:700;font-size:13.5px;box-shadow:0 10px 30px rgba(0,0,0,.3);
  opacity:0;transition:opacity .3s;z-index:200;pointer-events:none;max-width:90vw}
.toast.show{opacity:1}
.legend{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.legend span{font-size:10.5px;font-weight:800;color:#fff;border-radius:12px;padding:3px 10px;letter-spacing:.5px}
.member-row{display:flex;align-items:center;gap:11px;padding:9px 0;border-bottom:1px solid #F0EADC}
.member-row .avatar{cursor:default}
.member-row .m{flex:1}
.member-row .m b{display:block;font-size:14px}
.member-row .m span{font-size:11.5px;color:var(--muted);font-weight:600}
.swatch-pick{display:flex;gap:7px;flex-wrap:wrap;margin-top:4px}
.swatch-pick button{width:28px;height:28px;border-radius:8px;border:3px solid transparent}
.swatch-pick button.sel{border-color:var(--ink)}
.loading{min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;color:var(--muted);font-weight:700}

@media print{
  nav,.no-print{display:none!important}
  body{background:#fff}
  main{padding:0}
  .report{box-shadow:none;padding:10px}
}
@media (max-width:900px){.my-grid,.prog-wrap{grid-template-columns:1fr}}
</style>
</head>
<body>

<div id="app"><div class="loading"><div style="font-size:40px">⛰</div>Loading Production HQ…</div></div>
<div class="overlay" id="overlay"><div class="modal" id="modal"></div></div>
<div class="toast" id="toast"></div>

<script>
/* ================= CONFIG ================= */
const SUPABASE_URL = 'https://gpztlbbyylwkcykocczm.supabase.co';
const SUPABASE_KEY = 'sb_publishable_deJICRsdUfBSTfdYRO7EUw_yLKUCeiG';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const C = {forest:'#4C5A29',stone:'#8C6A47',water:'#2E4D63',fire:'#D5571E',sky:'#A3A8AE',
           earth:'#F4AF23',lava:'#9D2C2C',teal:'#4E8079',wind:'#3A5769',ink:'#2B2D3A'};
const CYCLE = [C.stone,C.earth,C.teal,C.lava,C.fire,C.water,C.wind,C.forest,C.sky];
const STANDARD_CATS = [
  ['Venue',C.stone],['Sponsors',C.earth],['Exhibitors',C.teal],['Compliance',C.lava],

function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function abbr(name){const w=name.trim().split(/\s+/);return w.length>1?w.map(x=>x[0]).join('').toUpperCase():name.slice(0,3).toUpperCase();}
function tint(hex,a){return `color-mix(in srgb, ${hex} ${a}%, white)`;}
function toast(m){const t=$('toast');t.innerHTML=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}
function fail(e){console.error(e);toast('⚠️ '+(e.message||e));}
function avatar(u){return u?`<span class="avatar" style="background:${u.color}" title="${esc(u.name)}">${u.initials}</span>`:'';}
function dueState(n){
  if(!n.due_date||n.done)return null;
  const d=Math.ceil((new Date(n.due_date+'T23:59')-Date.now())/86400000);
  if(d<0)return{d,cls:'over'};
  if(d<=(n.warn_days??7))return{d,cls:'warn'};
  return{d,cls:'ok'};
}
function dueChip(n){
  if(!n.due_date)return '';
  const label=new Date(n.due_date+'T12:00').toLocaleDateString('en-ZA',{day:'numeric',month:'short'});
  const s=dueState(n);
  if(!s)return `<span class="due" style="background:rgba(0,0,0,.06);color:#6d6858;opacity:.6">📅 ${label}</span>`;
  if(s.cls==='over')return `<span class="due" style="background:${C.lava};color:#fff">⚠ ${label} · ${-s.d}d overdue</span>`;
  if(s.cls==='warn')return `<span class="due" style="background:${C.earth};color:#4A3506">⏰ ${label} · ${s.d===0?'due today':'in '+s.d+'d'}</span>`;
  return `<span class="due" style="background:rgba(0,0,0,.07);color:#6d6858">📅 ${label}</span>`;
}
function ago(ts){const s=(Date.now()-new Date(ts).getTime())/1000;
  if(s<60)return 'Just now'; if(s<3600)return Math.floor(s/60)+'m ago'; if(s<86400)return Math.floor(s/3600)+'h ago';
  return Math.floor(s/86400)+'d ago';}

async function loadCore(){
  const [p,e,n] = await Promise.all([
    sb.from('profiles').select('*').order('created_at'),
    sb.from('events').select('*').order('created_at'),
    sb.from('notifications').select('*').eq('user_id', SESSION.user.id).order('created_at',{ascending:false}).limit(30),
  ]);
  if(p.error)throw p.error; if(e.error)throw e.error; if(n.error)throw n.error;
  PROFILES=p.data; EVENTS=e.data; NOTIFS=n.data;
  ME=PROFILES.find(x=>x.id===SESSION.user.id)||null;
  if(!EVENTS.find(x=>x.id===S.event)) S.event = EVENTS[0]?.id || null;
}
async function loadEvent(){
  if(!S.event){cur={cols:[],notes:[],files:[],msgs:[],atts:[],invs:[],pins:[],emails:[],acts:[]};return;}
  localStorage.setItem('afsa_event', S.event);
  const [c,n,f,m,a,iv,pn,em,ac] = await Promise.all([
    sb.from('columns').select('*').eq('event_id',S.event).order('position'),
    sb.from('notes').select('*').eq('event_id',S.event).order('created_at'),
    sb.from('drive_links').select('*').eq('event_id',S.event).order('name'),
    sb.from('messages').select('*').eq('event_id',S.event).order('created_at',{ascending:false}).limit(30),
    sb.from('column_files').select('*').eq('event_id',S.event).order('created_at'),
    sb.from('invoices').select('*').eq('event_id',S.event).order('created_at'),
    sb.from('pins').select('*').eq('event_id',S.event).order('created_at'),
    sb.from('emails').select('*').eq('event_id',S.event).order('received_at',{ascending:false}),
    sb.from('activity').select('*').eq('event_id',S.event).order('created_at',{ascending:false}).limit(60),
  ]);
  if(c.error)throw c.error; if(n.error)throw n.error; if(f.error)throw f.error; if(m.error)throw m.error; if(a.error)throw a.error; if(iv.error)throw iv.error; if(pn.error)throw pn.error; if(em.error)throw em.error; if(ac.error)throw ac.error;
  cur={cols:c.data,notes:n.data,files:f.data,msgs:m.data.reverse(),atts:a.data,invs:iv.data,pins:pn.data,emails:em.data,acts:ac.data};
  await signFiles();
}
async function refresh(){ try{ await loadCore(); await loadEvent(); await loadToday(); render(); }catch(e){fail(e);} }

/* ---------- TODAY (cross-board daily to-do) ---------- */
let TD=[], TDN={}, TDC={};
const saDate=()=>new Date(Date.now()+2*3600*1000).toISOString().slice(0,10);
const tdDone=t=>t.note_id?!!(TDN[t.note_id]&&TDN[t.note_id].done):!!t.done;
async function loadToday(){
  if(!ME)return;
  const {data,error}=await sb.from('today_items').select('*').eq('user_id',ME.id).eq('for_date',saDate()).order('position');
  if(error){console.error(error);return;}
  TD=data||[];
  const ids=TD.map(t=>t.note_id).filter(Boolean);
  TDN={};TDC={};
  if(ids.length){
    const [{data:ns},{data:cs}]=await Promise.all([
      sb.from('notes').select('id,title,done,archived,due_date,warn_days,column_id,event_id,assignee').in('id',ids),
      sb.from('columns').select('id,name,color,event_id'),
    ]);
    (ns||[]).forEach(n=>TDN[n.id]=n);
    (cs||[]).forEach(c=>TDC[c.id]=c);
  }
}
async function ensureToday(){
  if(!ME)return;
  const today=saDate();
  const {data:existing}=await sb.from('today_items').select('id').eq('user_id',ME.id).eq('for_date',today).limit(1);
  if(existing&&existing.length){await loadToday();return;}
  const rows=[]; let pos=0;
  // carry over unfinished items from the most recent previous list
  const {data:prev}=await sb.from('today_items').select('*').eq('user_id',ME.id).lt('for_date',today).order('for_date',{ascending:false}).limit(40);
  const prevDate=prev&&prev.length?prev[0].for_date:null;
  const carried=new Set();
  if(prevDate){
    const pids=prev.filter(p=>p.for_date===prevDate&&!p.removed&&p.note_id).map(p=>p.note_id);
    let openPrev={};
    if(pids.length){const {data:pn}=await sb.from('notes').select('id,done,archived').in('id',pids);(pn||[]).forEach(n=>openPrev[n.id]=n);}
    for(const p of prev.filter(p=>p.for_date===prevDate&&!p.removed)){
      if(p.note_id){const n=openPrev[p.note_id]; if(n&&!n.done&&!n.archived){rows.push({user_id:ME.id,for_date:today,note_id:p.note_id,reason:'carried over',position:pos++});carried.add(p.note_id);}}
      else if(!p.done&&p.text_line){rows.push({user_id:ME.id,for_date:today,text_line:p.text_line,reason:'carried over',position:pos++});}
    }
  }
  // auto-pick from every board I can see: overdue + inside flag window (mine or unassigned)
  const {data:cand}=await sb.from('notes').select('id,title,done,archived,due_date,warn_days,assignee').eq('done',false).eq('archived',false).not('due_date','is',null);
  const t0=new Date(today+'T00:00:00Z').getTime();
  for(const n of (cand||[])){
    if(carried.has(n.id))continue;
    if(n.assignee&&n.assignee!==ME.id)continue;
    const days=Math.round((new Date(n.due_date+'T00:00:00Z').getTime()-t0)/86400000);
    if(days>(n.warn_days??7))continue;
    rows.push({user_id:ME.id,for_date:today,note_id:n.id,reason:days<0?`overdue ${-days}d`:days===0?'due today':`due in ${days}d`,position:pos++});
  }
  if(rows.length){const {error}=await sb.from('today_items').insert(rows);if(error)console.error(error);}
  else{await sb.from('today_items').insert({user_id:ME.id,for_date:today,text_line:null,reason:'__init__',removed:true,position:0});}
  await loadToday();
}
function tdReason(t){
  if(!t.note_id)return t.reason==='carried over'?'carried over':'';
  const n=TDN[t.note_id]; if(!n)return t.reason;
  if(n.due_date){
    const days=Math.round((new Date(n.due_date+'T00:00:00Z').getTime()-new Date(saDate()+'T00:00:00Z').getTime())/86400000);
    if(days<0)return `overdue ${-days} day${days===-1?'':'s'}`;
    if(days===0)return 'due today';
    if(days<=(n.warn_days??7))return `due in ${days} day${days===1?'':'s'}`;
  }
  return t.reason||'';
}
function todayView(){
  const items=TD.filter(t=>!t.removed&&t.reason!=='__init__'&&(t.note_id?TDN[t.note_id]&&!TDN[t.note_id].archived:t.text_line));
  const open=items.filter(t=>!tdDone(t)), doneItems=items.filter(t=>tdDone(t));
  const over=open.filter(t=>/^overdue/.test(tdReason(t))).length;
  const dateLbl=new Date().toLocaleDateString('en-ZA',{weekday:'long',day:'numeric',month:'long'});
  const row=t=>{
    const n=t.note_id?TDN[t.note_id]:null;
    const c=n?TDC[n.column_id]:null;
    const ev=n?EVENTS.find(e=>e.id===n.event_id):null;
    const r=tdReason(t); const overdue=/^overdue/.test(r); const d=tdDone(t);
    return `<div class="task-row ${d?'done':''}" draggable="true" ondragstart="tdDrag(event,'${t.id}')" ondragover="event.preventDefault()" ondrop="tdDrop(event,'${t.id}')" style="--c:${c?c.color:'#B4B2A9'};${overdue&&!d?'background:#FCEEEC;':''}">
      <button class="chk ${d?'on':''}" onclick="tdToggle('${t.id}')">${d?'✔':''}</button>
      <div class="t" style="min-width:0">
        <b style="${d?'text-decoration:line-through;opacity:.55':''}">${esc(n?n.title:t.text_line)}</b>
        <span style="color:${c?c.color:'var(--muted)'}">${n?`${ev?esc(ev.name):''}${ev&&ev.private_to?' 🔒':''} › ${c?esc(c.name):''}`:'quick job — not on a board'}</span>
      </div>
      ${r?`<span style="flex:none;font-size:11px;font-weight:800;border-radius:9px;padding:2px 9px;${overdue?'background:#F7C1C1;color:#791F1F':r==='carried over'?'background:#EEE9DB;color:#6d6858':'background:#FAEEDA;color:#854F0B'}">${esc(r)}</span>`:''}
      ${n?`<button class="btn ghost" style="flex:none;padding:4px 10px;font-size:11px" onclick="tdOpen('${t.id}')">open ↗</button>`:''}
      <button style="flex:none;background:none;color:${C.lava};font-weight:800" title="Not today — remove from this list" onclick="tdRemove('${t.id}')">✕</button>
    </div>`;
  };
  return `<div class="view-title"><h2>☀️ Today</h2>
    <span class="sub">${dateLbl} · your day across every board — only you see this list</span>
    ${over?`<span class="pill" style="background:${C.lava}">${over} overdue</span>`:''}
    <span class="pill" style="background:${C.forest}">${doneItems.length}/${items.length} done</span>
    <button class="btn ghost no-print" style="margin-left:auto" onclick="tdRebuild()">↻ Rebuild from boards</button>
  </div>
  <div class="panel" style="margin-top:14px">
    ${open.map(row).join('')||'<p style="color:var(--muted);font-weight:600;padding:4px 2px">Nothing on your list — enjoy it, or pull tasks in with ↻ Rebuild, the ☀ button on any sticky note, or a quick line below.</p>'}
    ${doneItems.length?`<div style="margin-top:10px;padding-top:8px;border-top:1px solid #F0EADC;font-size:11.5px;font-weight:800;color:var(--muted)">DONE TODAY</div>${doneItems.map(row).join('')}`:''}
    <div style="display:flex;gap:8px;margin-top:14px">
      <input id="td-new" placeholder="＋ Add a quick job for today… (Enter to add)" onkeydown="if(event.key==='Enter'){event.preventDefault();tdAddManual();}">
      <button class="btn" onclick="tdAddManual()">＋ Add</button>
    </div>
    <p style="font-size:11.5px;color:var(--muted);margin:10px 0 0">Ticking a board task here ticks the real sticky note too · unfinished items carry over tomorrow · drag to reorder</p>
  </div>`;
}
async function tdToggle(id){
  const t=TD.find(x=>x.id===id); if(!t)return;
  try{
    if(t.note_id){const n=TDN[t.note_id]; const {error}=await sb.from('notes').update({done:!n.done}).eq('id',t.note_id); if(error)throw error; n.done=!n.done;
      if(n.done)toast(`✔ Done — ticked on the ${esc((EVENTS.find(e=>e.id===n.event_id)||{}).name||'')} board too`);}
    else{const {error}=await sb.from('today_items').update({done:!t.done}).eq('id',id); if(error)throw error; t.done=!t.done;}
    render();
  }catch(e){fail(e);}
}
async function tdRemove(id){
  try{const {error}=await sb.from('today_items').update({removed:true}).eq('id',id); if(error)throw error;
  const t=TD.find(x=>x.id===id); if(t)t.removed=true; render();}catch(e){fail(e);}
}
async function tdAddManual(){
  const el=$('td-new'); const v=el?el.value.trim():''; if(!v)return;
  try{const {data,error}=await sb.from('today_items').insert({user_id:ME.id,for_date:saDate(),text_line:v,position:TD.length}).select().single();
  if(error)throw error; TD.push(data); if(el)el.value=''; render(); setTimeout(()=>{const e2=$('td-new');if(e2)e2.focus();},30);}catch(e){fail(e);}
}
async function tdOpen(id){
  const t=TD.find(x=>x.id===id); if(!t||!t.note_id)return;
  const n=TDN[t.note_id]; if(!n)return;
  await switchEvent(n.event_id); go('board');
  setTimeout(()=>jumpToNote(n.column_id,n.id),120);
}
async function tdRebuild(){
  const today=saDate();
  const have=new Set(TD.filter(t=>t.note_id).map(t=>t.note_id));
  const {data:cand}=await sb.from('notes').select('id,done,archived,due_date,warn_days,assignee').eq('done',false).eq('archived',false).not('due_date','is',null);
  const t0=new Date(today+'T00:00:00Z').getTime();
  const rows=[]; let pos=TD.length;
  for(const n of (cand||[])){
    if(have.has(n.id))continue;
    if(n.assignee&&n.assignee!==ME.id)continue;
    const days=Math.round((new Date(n.due_date+'T00:00:00Z').getTime()-t0)/86400000);
    if(days>(n.warn_days??7))continue;
    rows.push({user_id:ME.id,for_date:today,note_id:n.id,position:pos++});
  }
  try{
    if(rows.length){const {error}=await sb.from('today_items').insert(rows); if(error)throw error;}
    await loadToday(); render();
    toast(rows.length?`↻ Added ${rows.length} task${rows.length>1?'s':''} that need${rows.length>1?'':'s'} you`:'↻ Nothing new — your list already covers it');
  }catch(e){fail(e);}
}
async function addToToday(noteId){
  const today=saDate();
  try{
    const ex=TD.find(t=>t.note_id===noteId);
    if(ex){if(ex.removed){await sb.from('today_items').update({removed:false}).eq('id',ex.id);ex.removed=false;render();}
      toast('☀ On your Today list');return;}
    const {data,error}=await sb.from('today_items').insert({user_id:ME.id,for_date:today,note_id:noteId,position:TD.length}).select().single();
    if(error)throw error; TD.push(data); await loadToday(); render(); toast('☀ Added to your Today list');
  }catch(e){fail(e);}
}
let _tdDrag=null;
function tdDrag(ev,id){ev.stopPropagation();_tdDrag=id;}
async function tdDrop(ev,targetId){
  ev.stopPropagation();ev.preventDefault();
  if(!_tdDrag||_tdDrag===targetId){_tdDrag=null;return;}
  const id=_tdDrag;_tdDrag=null;
  const list=TD.filter(t=>!t.removed).sort((a,b)=>a.position-b.position);
  const from=list.findIndex(t=>t.id===id); if(from<0)return;
  const item=list.splice(from,1)[0];
  const to=list.findIndex(t=>t.id===targetId); if(to<0)return;
  list.splice(to,0,item);
  list.forEach((t,i)=>t.position=i);
  render();
  try{for(const t of list){const {error}=await sb.from('today_items').update({position:t.position}).eq('id',t.id); if(error)throw error;}}catch(e){fail(e);}
}

let rt=null, rtTimer=null;
function subscribeRealtime(){
  if(rt) sb.removeChannel(rt);
  rt = sb.channel('db-changes')
    .on('postgres_changes',{event:'*',schema:'public'},()=>{
      clearTimeout(rtTimer);
      rtTimer=setTimeout(()=>{
        if($('overlay').classList.contains('open')){pendingRefresh=true;return;}
        refresh();
      },500);
    }).subscribe();
}

/* ================= STATS ================= */
function statsFor(notes,colId){
  const ns=colId?notes.filter(n=>n.column_id===colId):notes;
  const d=ns.filter(n=>n.done).length;
  return {d,t:ns.length,p:ns.length?Math.round(d/ns.length*100):0};
}
const eventStatsCache={};
async function loadHomeStats(){
  const {data,error}=await sb.from('notes').select('event_id,column_id,done,due_date,warn_days');
  if(error)throw error;
  const {data:allCols,error:e2}=await sb.from('columns').select('*').order('position');
  if(e2)throw e2;
  const {data:allInv}=await sb.from('invoices').select('event_id,kind,amount,paid,due_date');
  eventStatsCache.notes=data; eventStatsCache.cols=allCols; eventStatsCache.invs=allInv||[];
}

/* ================= RENDER ================= */
function render(){
  const app=$('app');
  if(!SESSION){app.innerHTML=loginView();return;}
  if(!ME){app.innerHTML=`<div class="loading">Your login isn't linked to a team profile yet.<br>Ask your admin to re-invite you.<button class="btn" onclick="signOut()">Sign out</button></div>`;return;}
  const unread=NOTIFS.filter(n=>!n.read).length;
  app.innerHTML=`
  <nav>
    <div class="logo-wrap" onclick="go('home')">${LOGO}
      <div class="logo-text"><b>ADVENTURE</b><span>FEST SA</span></div>
    </div>
    <div class="tabs">
      <button class="${S.view==='home'?'active':''}" onclick="go('home')">🏠 Home</button>
      <button class="${S.view==='today'?'active':''}" onclick="go('today')">☀️ Today${(()=>{const o=TD.filter(t=>!t.removed&&!tdDone(t)).length;return o?`<span class="dot" style="position:static;margin-left:5px">${o}</span>`:'';})()}</button>
      <button class="${S.view==='board'?'active':''}" onclick="go('board')">📋 Board</button>
      <button class="${S.view==='my'?'active':''}" onclick="go('my')">🗂 My Board</button>
      <button class="${S.view==='progress'?'active':''}" onclick="go('progress')">📊 Progress</button>
      <button class="${S.view==='ask'?'active':''}" onclick="go('ask')">💬 Ask</button>
      <button class="${S.view==='money'?'active':''}" onclick="go('money')">💰 Money</button>
      <button class="${S.view==='report'?'active':''}" onclick="go('report')">📄 Report</button>
    </div>
    <div class="nav-right">
      ${EVENTS.length?`<select class="event-switch" onchange="switchEvent(this.value)">
        ${EVENTS.map(e=>`<option value="${e.id}" ${e.id===S.event?'selected':''}>${esc(e.name)}</option>`).join('')}
      </select>`:''}
      <button class="bell" onclick="go('my')" title="Notifications">🔔${unread?`<span class="dot">${unread}</span>`:''}</button>
      <span onclick="teamModal()">${avatar(ME)}</span>
    </div>
  </nav>
  <main>${{home:homeView,today:todayView,board:boardView,my:myView,progress:progressView,report:reportView,ask:askView,money:moneyView}[S.view]()}</main>`;
}
function go(v){
  S.view=v;
  if(v==='home'){loadHomeStats().then(render).catch(fail);}
  if(v==='today'){loadToday().then(render).catch(fail);}
  if(v==='my') markRead();
  render();
}
async function switchEvent(id){S.event=id;try{await loadEvent();render();}catch(e){fail(e);}}

function togglePw(){
  const i=$('li-pw'); i.type = i.type==='password' ? 'text' : 'password';
  $('pw-eye').textContent = i.type==='password' ? '👁' : '🙈';
}
async function doLogin(){
  const b=$('li-go');b.disabled=true;$('login-err').textContent='';
  const {data,error}=await sb.auth.signInWithPassword({email:$('li-email').value.trim(),password:$('li-pw').value});
  if(error){$('login-err').textContent=error.message;b.disabled=false;return;}
  SESSION=data.session;
  await bootData();
}
async function signOut(){await sb.auth.signOut();location.reload();}

/* ---------- HOME ---------- */
function homeView(){
  const allNotes=eventStatsCache.notes||cur.notes, allCols=eventStatsCache.cols||cur.cols;
  setTimeout(loadBrief,50);
  return `<div class="view-title"><h2>All Events</h2><span class="sub">Everything you have on the go, at a glance</span></div>
  <div class="panel" style="margin-top:16px;border-left:5px solid ${C.earth};border-radius:0 var(--radius) var(--radius) 0">
    <h3 style="margin-bottom:8px">☀️ Morning brief · <span style="font-family:Inter;font-size:12px;color:var(--muted);font-weight:700">${new Date().toLocaleDateString('en-ZA',{weekday:'long',day:'numeric',month:'long'})}</span>
      <button class="btn ghost no-print" style="margin-left:auto;padding:4px 10px;font-size:11.5px" onclick="loadBrief(true)">↻ Refresh</button></h3>
    <div id="brief-box" style="font-size:14px;line-height:1.65;white-space:pre-wrap;color:#44403a">✦ Reading the board…</div>
  </div>
  <div class="home-grid">
    ${EVENTS.filter(e=>!e.private_to).map(e=>{
      const notes=(allNotes||[]).filter(n=>n.event_id===e.id);
      const cols=(allCols||[]).filter(c=>c.event_id===e.id);
      const s=statsFor(notes);
      const mine=notes.filter(n=>n.assignee===ME.id&&!n.done).length;
      return `<div class="event-card" style="border-top-color:${cols[0]?cols[0].color:C.fire}">
        <h3>${esc(e.name)}</h3><div class="date">📅 ${esc(e.date_label)} &nbsp;·&nbsp; ${mine} task${mine!==1?'s':''} on your plate</div>
        ${(()=>{const f=notes.filter(nn=>(dueState(nn)||{}).cls&&dueState(nn).cls!=='ok').length;
          return f?`<div style="color:${C.lava};font-weight:800;font-size:12px;margin:-8px 0 10px">⚠ ${f} deadline${f>1?'s':''} need${f>1?'':'s'} attention</div>`:'';})()}
        ${(()=>{const iv=(eventStatsCache.invs||[]).filter(x=>x.event_id===e.id); if(!iv.length)return '';
          const s=(a)=>a.reduce((t,x)=>t+Number(x.amount||0),0);
          const io=iv.filter(x=>!x.paid&&(dueState({due_date:x.due_date,warn_days:7,done:x.paid})||{}).cls==='over').length;
          return `<div style="font-weight:800;font-size:12px;color:#6d6858;margin:-6px 0 10px">💰 in ${Rand(s(iv.filter(x=>x.kind==='in')))} · out ${Rand(s(iv.filter(x=>x.kind==='out')))}${io?` · <span style="color:${C.lava}">⚠ ${io} overdue</span>`:''}</div>`;})()}
        <div class="big-progress"><i style="width:${s.p}%"></i></div>
        <div class="pct-row"><span>${s.d} of ${s.t} tasks done</span><span>${s.p}%</span></div>
        <div class="minibars">
          ${cols.map(c=>{const cs=statsFor(notes.filter(n=>n.column_id===c.id));
            return `<div class="minibar-col" title="${esc(c.name)}: ${cs.p}% done">
              <div class="minibar"><i style="height:${Math.max(cs.p,4)}%;background:${c.color}"></i></div>
              <span class="mb-lbl" style="color:${c.color}">${abbr(c.name)}</span>
            </div>`;}).join('')||'<span style="font-size:12px;color:var(--muted);font-weight:600">No categories yet — open the board to add some</span>'}
        </div>
        <div class="card-foot">
          <div class="avatars">${PROFILES.map(u=>avatar(u)).join('')}</div>
          <button class="btn ghost" title="Copy this board's categories and tasks as a template for a new event" onclick="dupEvent('${e.id}')">⧉</button>
          <button class="btn" onclick="S.event='${e.id}';switchEvent('${e.id}').then(()=>go('board'))">Open board →</button>
        </div>
      </div>`;}).join('')}
    <button class="new-event" onclick="newEventModal()">＋ &nbsp;New event board</button>
  </div>
  ${(()=>{const priv=EVENTS.filter(e=>e.private_to&&(e.private_to===ME.id||(e.shared_with||[]).includes(ME.id))); if(!priv.length)return '';
    return `<div class="view-title" style="margin-top:26px"><h2 style="font-size:19px">🔒 My private boards</h2><span class="sub">Only you — and anyone a board is shared with — can see these</span></div>
    <div class="home-grid">
      ${priv.map(e=>{
        const notes=(eventStatsCache.notes||cur.notes||[]).filter(n=>n.event_id===e.id);
        const cols=(eventStatsCache.cols||cur.cols||[]).filter(c=>c.event_id===e.id);

let _briefText=null;
async function loadBrief(force){
  const box=$('brief-box'); if(!box)return;
  if(_briefText&&!force){box.textContent=_briefText;return;}
  if(force){box.textContent='✦ Rewriting your brief…';_briefText=null;}
  try{
    const {data:{session}}=await sb.auth.getSession();
    const res=await fetch(`${SUPABASE_URL}/functions/v1/morning-brief`,{
      method:'POST',
      headers:{'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':`Bearer ${session.access_token}`},
      body:JSON.stringify({force:!!force}),
    });
    const j=await res.json();
    if(!res.ok||j.error)throw new Error(j.error||'failed');
    _briefText=j.text;
    const b=$('brief-box'); if(b)b.textContent=j.text;
  }catch(e){const b=$('brief-box'); if(b)b.textContent='⚠️ Brief unavailable: '+(e.message||e);}
}

async function saveShare(){
  const ids=[...document.querySelectorAll('.share-cb')].filter(c=>c.checked).map(c=>c.value);
  try{
    const {error}=await sb.from('events').update({shared_with:ids}).eq('id',S.event); if(error)throw error;
    for(const id of ids)if(!(evRow().shared_with||[]).includes(id))await notify(id,`${ME.name.split(' ')[0]} shared a private board with you: ${evRow().name}`);
    closeModal(); await loadCore(); await loadEvent(); render();
    toast(ids.length?`👥 Shared with ${ids.length} team member${ids.length>1?'s':''}`:'🔒 Back to only you');
  }catch(e){fail(e);}

async function dupEvent(srcId){
  const src=EVENTS.find(e=>e.id===srcId); if(!src)return;
  const name=prompt(`New event name (copying the structure of "${src.name}"):`); if(!name)return;
  const date=prompt('Date label (e.g. 14–15 Nov 2027):')||'';
  const withTasks=confirm('Also copy the tasks (as unticked to-dos, without deadlines or owners)?\n\nOK = categories + tasks · Cancel = categories only');
  try{
    const {data:ev,error}=await sb.from('events').insert({name:name.trim(),date_label:date.trim(),created_by:ME.id,private_to:src.private_to?ME.id:null}).select().single();
    if(error)throw error;
    const {data:srcCols,error:e2}=await sb.from('columns').select('*').eq('event_id',srcId).order('position');
    if(e2)throw e2;
    const map={};
    for(const c of srcCols){
      const {data:nc,error:e3}=await sb.from('columns').insert({event_id:ev.id,name:c.name,color:c.color,position:c.position}).select().single();
      if(e3)throw e3; map[c.id]=nc.id;
    }
    if(withTasks){
      const {data:srcNotes,error:e4}=await sb.from('notes').select('*').eq('event_id',srcId);
      if(e4)throw e4;
      for(const n of srcNotes){
        if(!map[n.column_id])continue;
        const {error:e5}=await sb.from('notes').insert({event_id:ev.id,column_id:map[n.column_id],title:n.title,description:n.description||'',
          subtasks:(n.subtasks||[]).map(s=>({t:s.t,d:false})),warn_days:n.warn_days??7,position:n.position??0,created_by:ME.id});
        if(e5)throw e5;
      }
    }
    await loadCore(); S.event=ev.id; await loadEvent();
    if(S.view==='home')await loadHomeStats();
    render();
    toast(`⧉ "${esc(name)}" created from the ${esc(src.name)} template`);
  }catch(e){fail(e);}
}

async function createBoard(){

  try{

const noteSort=(a,b)=>a.done-b.done||(a.position??0)-(b.position??0)||(a.created_at<b.created_at?-1:1);
async function dropOnNote(ev,targetId){
  ev.stopPropagation(); ev.preventDefault();
  document.body.classList.remove('drag-note');
  if(!_dragNote)return;
  const id=_dragNote; _dragNote=null;
  if(id===targetId)return;
  const n=cur.notes.find(x=>x.id===id); const t=cur.notes.find(x=>x.id===targetId);
  if(!n||!t)return;
  const colId=t.column_id; const movedCol=n.column_id!==colId;
  const list=cur.notes.filter(x=>x.column_id===colId&&x.id!==id).sort(noteSort);
  list.splice(list.findIndex(x=>x.id===targetId),0,n);
  n.column_id=colId;
  const updates=[];
  list.forEach((x,i)=>{if((x.position??0)!==i||x.id===id){x.position=i;updates.push(x.id);}});
  render();
  try{
    for(const uid of updates){
      const x=cur.notes.find(z=>z.id===uid);
      const {error}=await sb.from('notes').update(uid===id?{position:x.position,column_id:colId}:{position:x.position}).eq('id',uid);
      if(error)throw error;
    }
    if(movedCol)toast(`📌 Moved to ${esc(cur.cols.find(c=>c.id===colId)?.name||'')}`);
  }catch(e){fail(e); await loadEvent(); render();}
}
let _dragCol=null, _dragNote=null;
function dragCol(id){_dragCol=id;_dragNote=null;}
function dragNote(ev,id){ev.stopPropagation();try{ev.dataTransfer.setData('text/plain',id);ev.dataTransfer.effectAllowed='move';}catch(_){}_dragNote=id;_dragCol=null;document.body.classList.add('drag-note');}
async function dropOnCol(targetId){
  if(_dragNote){
    const id=_dragNote; _dragNote=null;
    const n=cur.notes.find(x=>x.id===id);
    if(!n||n.column_id===targetId)return;
    const cName=cur.cols.find(c=>c.id===targetId)?.name||'';
    const endPos=cur.notes.filter(x=>x.column_id===targetId).length;
    try{
      const {error}=await sb.from('notes').update({column_id:targetId,position:endPos}).eq('id',id); if(error)throw error;
      await loadEvent(); render(); toast(`📌 Moved to ${esc(cName)}`);
    }catch(e){fail(e);}
    return;
  }
  if(!_dragCol||_dragCol===targetId){_dragCol=null;return;}
  const from=cur.cols.findIndex(c=>c.id===_dragCol);
  const item=cur.cols.splice(from,1)[0];
  const to=cur.cols.findIndex(c=>c.id===targetId);
  cur.cols.splice(to,0,item); _dragCol=null; render();
  try{await Promise.all(cur.cols.map((c,i)=>sb.from('columns').update({position:i}).eq('id',c.id)));}catch(e){fail(e);}
}

/* Files live in a private bucket — links are signed per session, signed-in team only */
async function signFiles(){
  try{
    const paths=[...(cur.atts||[]).map(a=>a.path),...(cur.invs||[]).map(v=>v.file_path)].filter(Boolean);
    if(!paths.length)return;
    const {data,error}=await sb.storage.from('attachments').createSignedUrls(paths,60*60*12);
    if(error||!data)return;
    const m={}; data.forEach(s=>{if(s.signedUrl)m[s.path]=s.signedUrl;});
    (cur.atts||[]).forEach(a=>{if(a.path&&m[a.path])a.url=m[a.path];});
    (cur.invs||[]).forEach(v=>{if(v.file_path&&m[v.file_path])v.file_url=m[v.file_path];});
  }catch(_){/* links just stay as stored */}
}
async function signPath(p){
  try{const {data}=await sb.storage.from('attachments').createSignedUrl(p,60*60*12);return data?.signedUrl||'';}catch(_){return '';}
}

  toast('⬆️ Uploading '+esc(file.name)+'…');
  try{
    const path=S.event+'/'+colId+'/'+Date.now()+'_'+file.name.replace(/[^\w.\-]+/g,'_');
    const {error}=await sb.storage.from('attachments').upload(path,file); if(error)throw error;
    const {error:e2}=await sb.from('column_files').insert({event_id:S.event,column_id:colId,name:file.name,path,url:''});
    if(e2)throw e2;

/* ---------- ASK CLAUDE (chat) ---------- */
let _clLog=[], _clSub=null;
function askClaude(id,subIdx){
  const n=cur.notes.find(x=>x.id===id);
  _clLog=[]; lastClaudeText='';
  _clSub=(subIdx!=null&&(n.subtasks||[])[subIdx])?n.subtasks[subIdx].t:null;
  openModal(`<h3>✦ Ask Claude · <span style="font-weight:400;font-size:14px">${esc(n.title)}${_clSub?' · <b style="color:#C75B12">step: '+esc(_clSub)+'</b>':''}</span></h3>
    <div id="cl-r" style="display:none;max-height:44vh;overflow-y:auto;margin:6px 0"></div>
    <label id="cl-lbl">${_clSub?'Claude will focus on this step of the task. You can keep chatting after each answer.':'Your brief — Claude knows this task, its category and your event. You can keep chatting after each answer.'}</label>
    <textarea id="cl-q" rows="3" placeholder="${_clSub?'e.g. How do I get this step done? Draft what I need…':'e.g. Draft the sponsor follow-up email for this task…'}" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();runClaude('${id}');}"></textarea>
    <div class="row">
      <button class="btn ghost" onclick="closeModal()">Close</button>
      <button class="btn" id="cl-mail" style="display:none" onclick="mailClaude('${id}')">📧 Send as email</button>
      <button class="btn" id="cl-save" style="display:none" onclick="saveClaude('${id}')">💾 Save to note</button>
      <button class="btn orange" id="cl-go" onclick="runClaude('${id}')">✦ Ask Claude</button>
    </div>`);
}
function clRender(thinking){
  const r=$('cl-r'); if(!r)return;
  r.style.display=(_clLog.length||thinking)?'block':'none';
  r.innerHTML=_clLog.map(m=>m.role==='user'
    ?`<div style="background:#EFE9DA;border-radius:12px 12px 3px 12px;padding:9px 12px;margin:8px 0 8px 40px;font-size:13.5px;white-space:pre-wrap">${esc(m.content)}</div>`
    :`<div class="claude-resp" style="white-space:pre-wrap;margin:8px 40px 8px 0">${esc(m.content)}</div>`).join('')
    +(thinking?'<div style="color:var(--muted);font-size:13px;padding:6px 2px">✦ Claude is thinking…</div>':'');
  r.scrollTop=r.scrollHeight;
}
let lastClaudeText='';
async function runClaude(id){
  let q=$('cl-q').value.trim(); if(!q){toast('Type a brief first');return;}
  if(_clSub&&!_clLog.length)q=`(This question is specifically about the step "${_clSub}" of the task.) ${q}`;
  const history=_clLog.map(m=>({role:m.role,content:m.content}));
  _clLog.push({role:'user',content:q}); $('cl-q').value=''; clRender(true);
  const b=$('cl-go'); b.disabled=true;
  try{
    const {data:{session}}=await sb.auth.getSession();
    const res=await fetch(`${SUPABASE_URL}/functions/v1/ask-claude`,{
      method:'POST',
      headers:{'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':`Bearer ${session.access_token}`},
      body:JSON.stringify({note_id:id,brief:q,history}),
    });
    const j=await res.json();
    if(j.error==='NOT_CONNECTED'){
      _clLog.pop(); $('cl-q').value=q; clRender(false);
      toast("✦ Claude isn't connected yet — add the API key in Supabase first"); b.disabled=false; return;
    }
    if(!res.ok||j.error)throw new Error(j.error||'Request failed');
    lastClaudeText=j.text;
    _clLog.push({role:'assistant',content:j.text});
    $('cl-save').style.display='';
    if(ME.email_connected)$('cl-mail').style.display='';
    const lbl=$('cl-lbl'); if(lbl)lbl.textContent='Ask a follow-up — Claude remembers this conversation';
    b.textContent='✦ Send';
    const qa=$('cl-q'); if(qa){qa.placeholder='e.g. Make it shorter / change the date / now draft the email…';qa.focus();}
  }catch(e){_clLog.push({role:'assistant',content:'⚠️ '+(e.message||e)});}
  clRender(false); b.disabled=false;
}
async function saveClaude(id){
  const n=cur.notes.find(x=>x.id===id);
  const desc=(n.description?n.description+'\n\n':'')+'✦ Claude:\n'+lastClaudeText;
  try{const {error}=await sb.from('notes').update({description:desc}).eq('id',id); if(error)throw error;
  closeModal(); await loadEvent(); render(); toast('✦ Saved to the note');}catch(e){fail(e);}
}

          <div style="flex:1;min-width:0">
            <b style="font-size:13.5px;${i.paid?'text-decoration:line-through;opacity:.55':''}">${esc(i.party)}</b>${i.source==='email'?' 📩':''}
            <div style="font-size:11.5px;color:var(--muted);font-weight:600">${esc(i.descr||'')}${i.file_url?` · <a href="${esc(i.file_url)}" target="_blank" rel="noopener">invoice</a>`:''}${i.paid&&i.paid_at?` · paid ${i.paid_at}`:''}</div>
          </div>
          <b style="font-size:13.5px;${i.paid?'opacity:.5':''}">${Rand(i.amount)}</b>

async function saveInv(kind){
  const party=$('iv-party').value.trim(), amount=parseFloat($('iv-amount').value);
  if(!party||isNaN(amount)){toast('Name and amount are required');return;}
  const b=$('iv-go');b.disabled=true;
  try{
    let file_url=null, file_path=null;
    const f=$('iv-file').files[0];
    if(f&&f.size<=15*1024*1024){
      file_path=S.event+'/invoices/'+Date.now()+'_'+f.name.replace(/[^\w.\-]+/g,'_');
      const {error:e1}=await sb.storage.from('attachments').upload(file_path,f); if(e1)throw e1;
      file_url='';
    }
    const {error}=await sb.from('invoices').insert({event_id:S.event,kind,party,descr:$('iv-descr').value.trim(),amount,due_date:$('iv-due').value||null,file_url,file_path});
    if(error)throw error;
    closeModal(); await loadEvent(); render(); toast('💰 Invoice added');
  }catch(e){fail(e);b.disabled=false;}
}

    <label>Full name</label><input id="tm-name" placeholder="e.g. Riaan Venter">
    <label>Email</label><input id="tm-email" type="email" placeholder="name@adventurefestsa.co.za">
    <label>Role</label><input id="tm-role" placeholder="e.g. Operations">
    <label>Temporary password (share it with them — min 8 characters)</label><input id="tm-pw" placeholder="They can change it later">
    <label>Colour</label>
    <div class="swatch-pick" id="tm-colors">${Object.values(C).slice(0,9).map((c,i)=>`<button style="background:${c}" class="${i===0?'sel':''}" onclick="pickColor(this)" data-c="${c}"></button>`).join('')}</div>
    <div style="margin-top:16px;border-top:1px solid #F0EADC;padding-top:12px">
      <button class="btn ${ME.email_connected?'ghost':'orange'}" onclick="connectEmailModal()">📧 ${ME.email_connected?'Email connected ✓ · update':'Connect my email'}</button>
    </div>
    <div class="row">
      <button class="btn ghost" style="margin-right:auto" onclick="changePwModal()">🔑 Change my password</button>
      <button class="btn ghost" onclick="signOut()">Sign out</button>
      <button class="btn orange" id="tm-go" onclick="inviteMember()">Add member</button>
    </div>`);
}
function connectEmailModal(){
  const dom=(ME.email.split('@')[1]||'');
  openModal(`<h3>📧 Connect my email</h3>
    <div style="font-size:12.5px;color:var(--muted);line-height:1.5;margin-bottom:4px">Lets Claude send emails you approve, from your own address. Your password is stored encrypted and never shown to anyone.</div>
    <label>Email address</label><input id="em-addr" value="${esc(ME.email)}">
    <label>Mail server (SMTP)</label><input id="em-host" value="mail.${esc(dom)}">
    <div style="display:flex;gap:12px">
      <div style="width:120px"><label>Port</label><input id="em-port" type="number" value="465"></div>
      <div style="flex:1"><label>Mailbox password</label><input id="em-pw" type="password" placeholder="Your email password"></div>
    </div>
    <div class="row"><button class="btn ghost" onclick="closeModal()">Cancel</button>
    <button class="btn orange" id="em-go" onclick="connectEmailSave()">Connect</button></div>`);
}
async function connectEmailSave(){
  const email=$('em-addr').value.trim(), host=$('em-host').value.trim(), pw=$('em-pw').value;
  if(!email||!host||!pw){toast('All fields are required');return;}
  const b=$('em-go');b.disabled=true;
  try{
    const {data:{session}}=await sb.auth.getSession();
    const res=await fetch(`${SUPABASE_URL}/functions/v1/email-connect`,{
      method:'POST',
      headers:{'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':`Bearer ${session.access_token}`},
      body:JSON.stringify({email,smtp_host:host,smtp_port:parseInt($('em-port').value,10)||465,password:pw}),
    });
    const j=await res.json();
    if(!res.ok||j.error)throw new Error(j.error||'Could not save');
    await loadCore(); closeModal(); toast('📧 Email connected — ✦ Claude can now send drafts you approve');
  }catch(e){fail(e);b.disabled=false;}
}
function mailClaude(id){
  const n=cur.notes.find(x=>x.id===id);
  openModal(`<h3>📧 Send as email · <span style="font-weight:400;font-size:14px">from ${esc(ME.email)}</span></h3>
    <label>To</label><input id="ml-to" type="email" placeholder="recipient@example.co.za">
    <label>Subject</label><input id="ml-subj" value="${esc(n.title)}">
    <label>Message (edit before sending)</label>
    <textarea id="ml-body" rows="10" style="font-size:13px">${esc(lastClaudeText)}</textarea>
    <div class="row"><button class="btn ghost" onclick="closeModal()">Cancel</button>
    <button class="btn orange" id="ml-go" onclick="sendEmailNow('${id}')">📧 Send email</button></div>`);
}
async function sendEmailNow(id){
  const to=$('ml-to').value.trim(), subj=$('ml-subj').value.trim(), body=$('ml-body').value;
  if(!to||!subj||!body){toast('Recipient, subject and message are required');return;}
  const b=$('ml-go');b.disabled=true;b.textContent='Sending…';
  try{
    const {data:{session}}=await sb.auth.getSession();
    const res=await fetch(`${SUPABASE_URL}/functions/v1/send-email`,{
      method:'POST',
      headers:{'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':`Bearer ${session.access_token}`},
      body:JSON.stringify({to,subject:subj,body,note_id:id}),
    });
    const j=await res.json();
    if(j.error==='NO_EMAIL'){toast('Connect your email first (avatar → Connect my email)');b.disabled=false;b.textContent='📧 Send email';return;}
    if(!res.ok||j.error)throw new Error(j.error||'Send failed');
    closeModal(); await loadEvent(); render(); toast(`📧 Sent to ${to} — logged on the note`);
  }catch(e){fail(e);b.disabled=false;b.textContent='📧 Send email';}
}
function pickColor(btn){document.querySelectorAll('#tm-colors button').forEach(b=>b.classList.remove('sel'));btn.classList.add('sel');}
async function inviteMember(){
  const name=$('tm-name').value.trim(), email=$('tm-email').value.trim(), pw=$('tm-pw').value, role=$('tm-role').value.trim();
  if(!name||!email||!pw){toast('Name, email and password are required');return;}
  const color=document.querySelector('#tm-colors button.sel')?.dataset.c||C.fire;
  const b=$('tm-go');b.disabled=true;
  try{
    const {data:{session}}=await sb.auth.getSession();
    const res=await fetch(`${SUPABASE_URL}/functions/v1/invite-user`,{
      method:'POST',
      headers:{'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':`Bearer ${session.access_token}`},
      body:JSON.stringify({email,password:pw,name,role,color}),
    });
    const j=await res.json();
    if(!res.ok)throw new Error(j.error||'Could not create the account');
    await loadCore(); teamModal(); toast(`🎉 ${name.split(' ')[0]} added — they can sign in now`);
  }catch(e){fail(e);b.disabled=false;}
}
function changePwModal(){
  openModal(`<h3>🔑 Change my password</h3>
    <label>New password (min 8 characters)</label><input id="pw-new" type="password">
    <div class="row"><button class="btn ghost" onclick="teamModal()">Back</button>
    <button class="btn orange" onclick="changePw()">Update password</button></div>`);
}
async function changePw(){
  const pw=$('pw-new').value; if(pw.length<8){toast('Minimum 8 characters');return;}
  try{const {error}=await sb.auth.updateUser({password:pw}); if(error)throw error;
  closeModal(); toast('🔑 Password updated');}catch(e){fail(e);}
}

/* ---------- MODAL ---------- */
function openModal(html){$('modal').innerHTML=html;$('overlay').classList.add('open');}
function closeModal(){
  $('overlay').classList.remove('open');
  if(pendingRefresh){pendingRefresh=false;refresh();}
}
$('overlay').addEventListener('click',e=>{if(e.target.id==='overlay')closeModal();});

/* ================= BOOT ================= */
async function bootData(){
  try{
    await loadCore(); await loadEvent(); await loadHomeStats();
    await ensureToday();
    subscribeRealtime(); render();
  }catch(e){ fail(e); render(); }
}
(async ()=>{
  const {data:{session}}=await sb.auth.getSession();
  SESSION=session;
  if(SESSION) await bootData(); else render();
  sb.auth.onAuthStateChange((_ev,s)=>{ SESSION=s; if(!s)render(); });
})();
</script>
</body>
</html>
